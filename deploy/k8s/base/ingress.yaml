apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: letutex-ingress
  namespace: letutex
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  rules:
    - host: letutex.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-api
                port:
                  number: 8000
  tls:
    - hosts:
        - letutex.example.com
      secretName: letutex-tls
