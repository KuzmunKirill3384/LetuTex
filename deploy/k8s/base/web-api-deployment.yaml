apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-api
  namespace: letutex
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-api
  template:
    metadata:
      labels:
        app: web-api
    spec:
      containers:
        - name: web-api
          image: letutex/web-api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: letutex-config
          env:
            - name: PORT
              value: "8000"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: web-api
  namespace: letutex
spec:
  selector:
    app: web-api
  ports:
    - port: 8000
      targetPort: 8000
